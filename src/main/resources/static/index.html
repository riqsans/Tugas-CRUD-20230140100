<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD KTP - 20230140100</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .table-container { background: white; padding: 20px; border-radius: 15px; }
    </style>
</head>
<body class="container py-5">

<div class="text-center mb-5">
    <h2 class="fw-bold">Manajemen Data KTP</h2>
    <p class="text-muted">Tugas CRUD - NIM: 20230140100</p>
</div>

<div class="card p-4 mb-5">
    <h5 class="card-title mb-3" id="formTitle">Tambah Data KTP</h5>
    <form id="ktpForm">
        <input type="hidden" id="id"> <div class="row g-3">
        <div class="col-md-4">
            <label class="form-label">Nomor KTP</label>
            <input type="text" id="nomorKtp" class="form-control" placeholder="Masukkan 16 digit No. KTP" required>
        </div>
        <div class="col-md-4">
            <label class="form-label">Nama Lengkap</label>
            <input type="text" id="namaLengkap" class="form-control" placeholder="Nama Lengkap" required>
        </div>
        <div class="col-md-4">
            <label class="form-label">Jenis Kelamin</label>
            <select id="jenisKelamin" class="form-select" required>
                <option value="">-- Pilih --</option>
                <option value="Laki-laki">Laki-laki</option>
                <option value="Perempuan">Perempuan</option>
            </select>
        </div>
        <div class="col-md-8">
            <label class="form-label">Alamat</label>
            <input type="text" id="alamat" class="form-control" placeholder="Alamat Lengkap" required>
        </div>
        <div class="col-md-4">
            <label class="form-label">Tanggal Lahir</label>
            <input type="date" id="tanggalLahir" class="form-control" required>
        </div>
        <div class="col-12 mt-4">
            <button type="submit" id="btnSubmit" class="btn btn-primary px-4">Simpan Data</button>
            <button type="button" onclick="resetForm()" class="btn btn-secondary px-4">Batal</button>
        </div>
    </div>
    </form>
</div>

<div class="table-container shadow-sm">
    <h5 class="mb-3">Daftar Penduduk</h5>
    <table class="table table-hover">
        <thead class="table-dark">
        <tr>
            <th>No KTP</th>
            <th>Nama</th>
            <th>Alamat</th>
            <th>Tgl Lahir</th>
            <th>Gender</th>
            <th>Aksi</th>
        </tr>
        </thead>
        <tbody id="ktpTableBody">
        </tbody>
    </table>
</div>

<script>
    const API_URL = "http://localhost:8080/ktp";

    $(document).ready(function() {
        loadData();

        // Handle Submit (Create & Update)
        $('#ktpForm').submit(function(e) {
            e.preventDefault();
            const id = $('#id').val();
            const method = id ? 'PUT' : 'POST';
            const url = id ? `${API_URL}/${id}` : API_URL;

            const data = {
                nomorKtp: $('#nomorKtp').val(),
                namaLengkap: $('#namaLengkap').val(),
                alamat: $('#alamat').val(),
                tanggalLahir: $('#tanggalLahir').val(),
                jenisKelamin: $('#jenisKelamin').val()
            };

            $.ajax({
                url: url,
                type: method,
                contentType: "application/json",
                data: JSON.stringify(data),
                success: function(res) {
                    alert(res.message);
                    resetForm();
                    loadData();
                },
                error: function(err) {
                    alert("Gagal: " + (err.responseJSON ? err.responseJSON.message : "Terjadi kesalahan"));
                }
            });
        });
    });

    function loadData() {
        $.get(API_URL, function(res) {
            let rows = '';
            res.data.forEach(ktp => {
                rows += `<tr>
                    <td>${ktp.nomorKtp}</td>
                    <td>${ktp.namaLengkap}</td>
                    <td>${ktp.alamat}</td>
                    <td>${ktp.tanggalLahir}</td>
                    <td><span class="badge bg-info text-dark">${ktp.jenisKelamin}</span></td>
                    <td>
                        <button class="btn btn-sm btn-warning" onclick="editData('${ktp.id}')">Edit</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteData('${ktp.id}')">Hapus</button>
                    </td>
                </tr>`;
            });
            $('#ktpTableBody').html(rows);
        });
    }

    function editData(id) {
        $.get(`${API_URL}/${id}`, function(res) {
            const d = res.data;
            $('#id').val(d.id);
            $('#nomorKtp').val(d.nomorKtp).prop('disabled', true); // No KTP biasanya tidak boleh diedit
            $('#namaLengkap').val(d.namaLengkap);
            $('#alamat').val(d.alamat);
            $('#tanggalLahir').val(d.tanggalLahir);
            $('#jenisKelamin').val(d.jenisKelamin);

            $('#formTitle').text("Update Data KTP");
            $('#btnSubmit').text("Perbarui Data").removeClass('btn-primary').addClass('btn-success');
        });
    }

    function deleteData(id) {
        if(confirm("Apakah Anda yakin ingin menghapus data ini?")) {
            $.ajax({
                url: `${API_URL}/${id}`,
                type: 'DELETE',
                success: function(res) {
                    alert(res.message);
                    loadData();
                }
            });
        }
    }

    function resetForm() {
        $('#ktpForm')[0].reset();
        $('#id').val('');
        $('#nomorKtp').prop('disabled', false);
        $('#formTitle').text("Tambah Data KTP");
        $('#btnSubmit').text("Simpan Data").removeClass('btn-success').addClass('btn-primary');
    }
</script>
</body>
</html>
